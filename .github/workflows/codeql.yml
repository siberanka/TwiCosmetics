name: CodeQL


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  analyze:

    runs-on: ubuntu-24.04

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      # https://github.com/actions/checkout
      - name: Checkout Git repository
        uses: actions/checkout@v7.0.0

      # https://github.com/actions/cache
      # Note that we use actions/cache/restore instead of plain actions/cache to skip the cache writing at end of build
      - name: Cache Gradle
        uses: actions/cache/restore@v6.1.0
        with:
          path: |
            ~/.m2
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # https://github.com/gradle/gradle-build-action
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: wrapper
          cache-overwrite-existing: true
          cache-read-only: true

      # https://github.com/actions/setup-java
      - name: Setup JDK 21
        uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: 21
          java-package: jdk
          architecture: x64

      # https://github.com/github/codeql-action
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.37.1
        with:
          languages: java

      - name: Build project for test
        run: ./gradlew --no-daemon -S core:testClasses

      # https://github.com/github/codeql-action
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.37.1
